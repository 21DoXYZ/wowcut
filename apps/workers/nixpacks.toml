providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-10_x", "chromium", "ffmpeg"]

[phases.install]
cmds = ["cd ../.. && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "cd ../.. && pnpm --filter @wowcut/db exec prisma generate",
  "cd ../.. && pnpm --filter @wowcut/workers build"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[start]
cmd = "cd ../.. && pnpm --filter @wowcut/workers start"
