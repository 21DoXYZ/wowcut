providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-10_x", "chromium", "ffmpeg"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @wowcut/db exec prisma generate"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[start]
cmd = "pnpm --filter @wowcut/workers start"
